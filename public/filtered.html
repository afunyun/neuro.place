<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filtered</title>
    <link rel="stylesheet" href="static/css/dash.css"> <!-- Contains the .filtered-body and .filtered-text styles -->
    <style>
        /* Fallback styles if dash.css is not loaded or specific styles are preferred here */
        body.filtered-body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #111827; /* gray-900 */
            margin: 0;
            font-family: 'Inter', sans-serif; /* Optional: Consistent font */
        }

        .filtered-text {
            font-size: 3rem; /* text-5xl */
            color: white;
            text-shadow:
                0 0 7px #fff,
                0 0 10px #fff,
                0 0 21px #fff,
                0 0 42px #ec4899, /* Main pink glow color */
                0 0 82px #ec4899,
                0 0 92px #ec4899,
                0 0 102px #ec4899,
                0 0 151px #ec4899;
            animation: flickerGlow 1.5s infinite alternate;
        }

        @keyframes flickerGlow {
            0%, 100% {
                text-shadow:
                    0 0 7px #fff,
                    0 0 10px #fff,
                    0 0 21px #fff,
                    0 0 42px #ec4899,
                    0 0 82px #ec4899,
                    0 0 92px #ec4899,
                    0 0 102px #ec4899,
                    0 0 151px #ec4899;
            }
            50% {
                text-shadow:
                    0 0 5px #fff,
                    0 0 8px #fff,
                    0 0 18px #fff,
                    0 0 38px #f472b6, /* Slightly lighter pink for flicker */
                    0 0 75px #f472b6,
                    0 0 85px #f472b6,
                    0 0 95px #f472b6,
                    0 0 140px #f472b6;
            }
        }
    </style>
</head>
<body class="filtered-body">
    <div class="filtered-text">
        Filtered.
    </div>
</body>
</html>
